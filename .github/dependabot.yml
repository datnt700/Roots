version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      next:
        patterns:
          - 'next'
          - '@next/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      emotion:
        patterns:
          - '@emotion/*'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      pg:
        patterns:
          - 'pg'
          - '@types/pg'
      typescript:
        patterns:
          - 'typescript'
          - '@types/node'
