name: Bug Report
description: Report a bug on ROOTS (landing page or app)
title: '[bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug on ROOTS (GỐC)!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what you saw vs what you expected.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Visit the page
        2. Switch language to Vietnamese
        3. Scroll to hero section
        4. See error
    validations:
      required: true

  - type: dropdown
    id: section
    attributes:
      label: Which section or page?
      options:
        - Navbar
        - Hero
        - Problem
        - Solution
        - Competitive
        - Tech
        - Final CTA
        - Footer
        - Login / Auth
        - Dashboard
        - Timeline
        - Studio
        - Feedback
        - Parents
        - Record
        - Parent QR flow
        - General / other
    validations:
      required: true

  - type: dropdown
    id: locale
    attributes:
      label: Language / locale
      multiple: true
      options:
        - English (en)
        - Vietnamese (vi)
        - French (fr)
        - All locales

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: 'e.g. Chrome 124 on macOS, Safari on iPhone 15'

  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste any errors from the browser console.
      render: shell
