name: Feature Request
description: Suggest a new feature for ROOTS (landing page or app)
title: '[feat]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to ROOTS (GỐC)!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What user need, conversion goal, or family workflow does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the new section, page, component, or feature you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Hero section
        - Problem section
        - Solution section
        - Competitive section
        - Tech section
        - Final CTA section
        - Navbar
        - Footer
        - New landing section
        - Login / Auth
        - Dashboard
        - Timeline
        - Studio
        - Feedback
        - Parents page
        - Record page
        - Parent QR flow
        - i18n / translations
        - Performance
        - SEO
        - Other
    validations:
      required: true

  - type: textarea
    id: locales
    attributes:
      label: Translations needed
      description: If this adds user-visible text, list the copy in en, vi, and fr.
      placeholder: |
        en: "Preserve Your Family Story"
        vi: "Lưu Giữ Câu Chuyện Gia Đình"
        fr: "Préservez l'Histoire de Votre Famille"
